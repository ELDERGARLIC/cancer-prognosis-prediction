# Breast Cancer Prognosis Prediction - Configuration
# Knowledge Graph-Enhanced GAT + Calibrated Random Forest
#
# Enhancements applied after first-run analysis (alpha.md):
#   - Lowered STRING confidence threshold (700 -> 400) to densify the KG
#     (first run had 81% isolated gene nodes)
#   - Added Cox partial likelihood survival head (cox_loss_weight)
#   - Added CE label smoothing to exploit ordinal survival classes
#   - Added ordinal regression auxiliary loss
#   - Switched early-stopping criterion from val_loss to val_auc
#   - Increased patience (20 -> 30) to stabilize folds 4-5
#   - Larger gene set (200 -> 600) to restore LASSO expressiveness
#   - Robust clinical extraction: parse stage strings, keep ER/PR/HER2
#   - Tumor-stage all-NaN columns no longer filled with 0

data:
  tcga_project: TCGA-BRCA
  # Gene filtering
  min_total_counts: 1000
  n_genes_lasso: 600
  # STRING PPI threshold -- 400 gives ~5x more edges than 700
  # (first run had 64 edges / 81% isolated genes at threshold 700)
  string_confidence_threshold: 400
  # Densify the KG with expression co-expression edges (Pearson > threshold)
  coexpression_threshold: 0.7
  coexpression_top_k: 8  # max co-expression neighbors per gene
  # Survival discretization bins (days)
  survival_bins: [365, 1095, 1825]  # 1yr, 3yr, 5yr
  survival_labels: ["<1yr", "1-3yr", "3-5yr", ">5yr"]
  # SMOTE
  smote_strategy: auto
  # DisGeNET
  disease_cui: "C0006142"  # Breast cancer
  disease_semantic_type: "Neoplastic Process"

model:
  gat_layers: 3
  gat_heads: [8, 4, 1]
  hidden_dim: 128
  dropout: 0.4
  llm_embedding_dim: 768
  llm_model: "dmis-lab/biobert-base-cased-v1.2"
  # Projection layer: BioBERT 768 -> proj_dim feeds the GAT. Lowering this
  # shrinks the flattened patient tensor so SMOTE becomes tractable.
  # Set null/None to skip projection and feed raw 768-dim embeddings.
  projection_dim: 128

training:
  lr: 0.001
  weight_decay: 1.0e-4
  epochs: 200
  patience: 30          # was 20; folds 4-5 early-stopped at 22/25 epochs
  batch_size: 32
  cv_folds: 5
  aux_loss_weight: 0.3          # tumor stage classification head
  cox_loss_weight: 0.5          # DeepSurv-style partial likelihood head
  ordinal_loss_weight: 0.2      # ordinal regression on survival bins
  label_smoothing: 0.1          # CE label smoothing (ordinal neighbor bleed)
  early_stop_metric: "auc_roc"  # was "loss"; val_auc is more stable
  seed: 42

hybrid:
  rf_n_estimators: 500
  rf_calibrated: true
  rf_max_depth: null
  rf_min_samples_split: 5

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  knowledge_graph: "data/knowledge_graph"
  embeddings: "data/embeddings"
  results: "results"
